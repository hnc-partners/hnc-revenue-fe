name: Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (e.g., latest, sha-abc1234)'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Frontend-specific config - customize per repo
  CONTAINER_NAME: hnc-fe-template
  CONTAINER_PORT: 4099
  TRAEFIK_HOST: hncms-template-fe.scarif-0.duckdns.org

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            # Login to GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new image
            podman pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}

            # Stop and remove existing container (ignore errors if not exists)
            podman stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            podman rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            # Run new container with Traefik labels
            podman run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              --network host \
              -e PORT=${{ env.CONTAINER_PORT }} \
              --label "traefik.enable=true" \
              --label "traefik.http.routers.${{ env.CONTAINER_NAME }}.rule=Host(\`${{ env.TRAEFIK_HOST }}\`)" \
              --label "traefik.http.routers.${{ env.CONTAINER_NAME }}.entrypoints=web" \
              --label "traefik.http.services.${{ env.CONTAINER_NAME }}.loadbalancer.server.port=${{ env.CONTAINER_PORT }}" \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}

            # Verify container is running
            sleep 5
            podman ps | grep ${{ env.CONTAINER_NAME }} && echo "Deploy successful!" || (echo "Container failed to start" && exit 1)

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Container**: \`${{ env.CONTAINER_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://${{ env.TRAEFIK_HOST }}" >> $GITHUB_STEP_SUMMARY
